name: Build YouMod IPA & Update Repo

on:
  push:
    paths:
      - 'config.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read config
        id: cfg
        run: |
          YT_URL=$(python3 -c "import re; line=open('config.yml').read(); print(re.search(r'youtube_ipa_url:\s*[\"\'](.*?)[\"\']', line).group(1))")
          YT_VER=$(python3 -c "import re; line=open('config.yml').read(); print(re.search(r'youtube_version:\s*[\"\'](.*?)[\"\']', line).group(1))")
          echo "yt_url=$YT_URL" >> $GITHUB_OUTPUT
          echo "yt_ver=$YT_VER" >> $GITHUB_OUTPUT
          echo "tag=v$YT_VER" >> $GITHUB_OUTPUT
          echo "Detected YouTube version: $YT_VER"
          echo "IPA URL: $YT_URL"

      - name: Download decrypted YouTube IPA
        run: |
          curl -L --retry 3 "${{ steps.cfg.outputs.yt_url }}" -o youtube.ipa
          file_type=$(file --mime-type -b youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "Error: Not a valid IPA. Got: $file_type"
            exit 1
          fi
          echo "Downloaded: $(ls -lh youtube.ipa)"

      - name: Get YouTube version from IPA
        run: |
          unzip -q youtube.ipa -d ytextracted
          YT_VER=$(grep -A 1 '<key>CFBundleVersion</key>' ytextracted/Payload/YouTube.app/Info.plist | grep '<string>' | awk -F'[><]' '{print $3}')
          echo "YT_VERSION=$YT_VER" >> $GITHUB_ENV
          echo "IPA_NAME=YouMod_${YT_VER}.ipa" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          brew install make ldid swiftlint
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Clone Theos
        run: git clone --quiet --depth=1 --recurse-submodules https://github.com/theos/theos.git

      - name: Download iOS SDK
        run: |
          git clone --quiet --depth=1 -n --filter=tree:0 https://github.com/Tonwalter888/iOS-SDKs.git
          cd iOS-SDKs
          git sparse-checkout set --no-cone iPhoneOS18.6.sdk
          git checkout
          mv *.sdk ${{ github.workspace }}/theos/sdks

      - name: Install cyan
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          pipx inject cyan lief

      - name: Install tbd
        run: |
          wget --quiet "https://github.com/inoahdev/tbd/releases/download/2.2/tbd-mac" -O /usr/local/bin/tbd
          chmod +x /usr/local/bin/tbd

      - name: Clone YouTubeHeader and PSHeader
        run: |
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git ${{ github.workspace }}/theos/include/YouTubeHeader
          cp -r ${{ github.workspace }}/theos/include/YouTubeHeader ${{ github.workspace }}/theos/include/YTHeaders
          git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git ${{ github.workspace }}/theos/include/PSHeader

      - name: Clone all tweak sources
        run: |
          git clone --quiet --depth=1 https://github.com/Tonwalter888/YouMod.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git
          git clone --quiet --depth=1 https://github.com/Tonwalter888/YTUHD.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTABConfig.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouSpeed.git
          git clone --quiet --depth=1 https://github.com/therealFoxster/DontEatMyContent.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouMute.git
          git clone --quiet --depth=1 https://github.com/bhackel/YouLoop.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouSlider.git
          git clone --quiet https://github.com/PoomSmart/YouChooseQuality.git
          git clone --quiet --depth=1 https://github.com/Tonwalter888/YouShare.git
          git clone --quiet --depth=1 https://github.com/fosterbarnes/YTweaks.git
          git clone --quiet --depth=1 https://github.com/castdrian/Gonerino.git
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouGetCaption.git

      - name: Build all tweaks from source
        run: |
          export THEOS=${{ github.workspace }}/theos

          cd ${{ github.workspace }}/YouMod
          echo "YOUMOD_VERSION=$(grep '^Version:' control | cut -d ' ' -f2)" >> $GITHUB_ENV
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youmod.deb

          cd ${{ github.workspace }}/YouPiP
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youpip.deb

          cd ${{ github.workspace }}/YTUHD
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytuhd.deb

          cd ${{ github.workspace }}/Return-YouTube-Dislikes
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ryd.deb

          cd ${{ github.workspace }}/YouGroupSettings
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygs.deb

          cd ${{ github.workspace }}/YTVideoOverlay
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytvo.deb

          cd ${{ github.workspace }}/YTABConfig
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytabconfig.deb

          cd ${{ github.workspace }}/YouQuality
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youquality.deb

          cd ${{ github.workspace }}/YouSpeed
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youspeed.deb

          cd ${{ github.workspace }}/DontEatMyContent
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/demc.deb

          cd ${{ github.workspace }}/YouMute
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youmute.deb

          cd ${{ github.workspace }}/YouLoop
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youloop.deb

          cd ${{ github.workspace }}/YouSlider
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youslider.deb

          cd ${{ github.workspace }}/YouChooseQuality
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youchoose.deb


          cd ${{ github.workspace }}/YouShare
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/youshare.deb

          cd ${{ github.workspace }}/YTweaks
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ytweaks.deb

          cd ${{ github.workspace }}/Gonerino
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/gonerino.deb

          cd ${{ github.workspace }}/YouGetCaption
          make clean package DEBUG=0 FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          mv packages/*.deb ${{ github.workspace }}/ygc.deb

          echo "Built debs:"
          ls -lh ${{ github.workspace }}/*.deb

      - name: Inject tweaks into IPA with cyan
        run: |
          cd ${{ github.workspace }}
          ~/.local/bin/cyan -i youtube.ipa -o "${{ env.IPA_NAME }}" -uwef *.deb -n "YouTube" -b com.google.ios.youtube -q
          echo "Output IPA: $(ls -lh ${{ env.IPA_NAME }})"

      - name: Get IPA size
        id: size
        run: |
          SIZE=$(stat -f%z "${{ github.workspace }}/${{ env.IPA_NAME }}")
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Upload IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.cfg.outputs.tag }}
          name: "YouMod ${{ steps.cfg.outputs.yt_ver }}"
          body: |
            Auto-built YouMod IPA for YouTube ${{ steps.cfg.outputs.yt_ver }}
            YouMod version: ${{ env.YOUMOD_VERSION }}
            Built by GitHub Actions run ${{ github.run_id }}
          files: ${{ github.workspace }}/${{ env.IPA_NAME }}
          make_latest: true

      - name: Update AltStore repo JSON
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          YT_VER="${{ steps.cfg.outputs.yt_ver }}"
          IPA_NAME="${{ env.IPA_NAME }}"
          SIZE="${{ steps.size.outputs.size }}"
          REPO_USER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          DOWNLOAD_URL="https://github.com/$REPO_USER/$REPO_NAME/releases/download/v$YT_VER/$IPA_NAME"
          python3 -c "
          import json
          with open('apps.json') as f:
              data = json.load(f)
          new_version = {
              'version': '$YT_VER-youmod',
              'date': '$TODAY',
              'localizedDescription': 'Auto-built from YouTube $YT_VER',
              'downloadURL': '$DOWNLOAD_URL',
              'size': $SIZE,
              'minOSVersion': '14.0',
              'maxOSVersion': ''
          }
          data['apps'][0]['versions'].insert(0, new_version)
          data['apps'][0]['versions'] = data['apps'][0]['versions'][:5]
          with open('apps.json', 'w') as f:
              json.dump(data, f, indent=2)
          print('apps.json updated')
          "

      - name: Commit updated apps.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git commit -m "Auto-update: YouMod for YouTube ${{ steps.cfg.outputs.yt_ver }}"
          git push
